site_name: Microsoft Technical Archive
site_description: Enterprise Security Engineering Knowledge Base for Microsoft platforms.
site_url: https://fetilonia.github.io/
repo_url: https://github.com/fetilonia/fetilonia.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  logo: assets/brand.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Light mode

plugins:
  - search:
      lang:
        - ko
        - en
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fetilonia
  generator: false

copyright: Microsoft Technical Archive · Source scope is restricted to the authorized Notion archive.

